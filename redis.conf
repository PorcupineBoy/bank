# Redis configuration for Bank Project
# Default settings with persistence enabled for session safety

# Network
bind 0.0.0.0
port 6379
protected-mode no

# General
daemonize no
supervised no

# Persistence (RDB snapshot every 60 seconds if at least 1 key changed)
save 60 1
dbfilename dump.rdb
dir /data

# Append Only File (AOF) for better durability
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec

# Memory
maxmemory 256mb
maxmemory-policy allkeys-lru

# Security
requirepass 9ijnNJI(

# Logging
loglevel notice
